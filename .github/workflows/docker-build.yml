name: Docker Build & Publish

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build base image (extensions + composer)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: base
          push: false
          load: true
          tags: franken-laravel:base
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

      - name: Verify PHP extensions
        run: |
          echo "=== PHP version ==="
          docker run --rm franken-laravel:base php -v
          echo ""
          echo "=== Checking required extensions ==="
          docker run --rm franken-laravel:base php -r "
            \$required = ['decimal', 'redis', 'amqp', 'pdo_mysql', 'bcmath', 'gd', 'intl', 'gmp', 'zip', 'pcntl', 'sockets', 'apcu'];
            \$missing = [];
            foreach (\$required as \$ext) {
              if (!extension_loaded(\$ext)) { \$missing[] = \$ext; }
              else { echo 'OK: ' . \$ext . PHP_EOL; }
            }
            // OPcache is a Zend extension — extension_loaded() always returns false for it
            if (function_exists('opcache_get_status')) { echo 'OK: opcache (Zend)' . PHP_EOL; }
            else { \$missing[] = 'opcache'; }
            if (\$missing) { echo 'MISSING: ' . implode(', ', \$missing) . PHP_EOL; exit(1); }
          "

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: app
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Smoke test — artisan version
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm ${{ fromJSON(steps.meta.outputs.json).tags[0] }} php artisan --version
